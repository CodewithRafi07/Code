<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Premium Ebook Store</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* 10. Visual & UX Enhancements: CSS Variables & Reset */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338ca;
            --secondary: #10B981;
            --dark: #1F2937;
            --light: #F9FAFB;
            --white: #ffffff;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-500: #6B7280;
            --text-main: #111827;
            --text-muted: #6B7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 8px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
        }
        
        /* Typography & Utilities */
        h1, h2, h3, h4, h5 { font-weight: 700; line-height: 1.2; }
        a { text-decoration: none; color: inherit; transition: var(--transition); }
        button { cursor: pointer; border: none; font-family: inherit; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .grid { display: grid; gap: 20px; }
        .hidden { display: none !important; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .animate-slide-in { animation: slideInRight 0.3s ease-out forwards; }

        /* UI Components */
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-outline { border: 1px solid var(--gray-200); background: white; color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 0.875rem; }
        .btn-icon { padding: 8px; border-radius: 50%; }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-sale { background: #FEF2F2; color: #DC2626; }
        .badge-rating { background: #FFFBEB; color: #D97706; display: inline-flex; align-items: center; gap: 2px; }

        /* Skeleton Loader */
        .skeleton {
            background: #e0e0e0;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Toast Notification */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: white; padding: 12px 20px; border-radius: var(--radius);
            box-shadow: var(--shadow-lg); border-left: 4px solid var(--primary);
            display: flex; align-items: center; gap: 10px; animation: slideInRight 0.3s ease;
        }
        .toast.success { border-color: var(--secondary); }
        .toast.error { border-color: #DC2626; }

        /* Specific View Styles */
        /* 2. Navigation */
        header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; }
        .nav-link { font-weight: 500; color: var(--text-muted); padding: 8px 12px; border-radius: var(--radius); }
        .nav-link:hover, .nav-link.active { color: var(--primary); background: #EEF2FF; }
        
        /* 1. Homepage */
        .hero { 
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%); 
            padding: 80px 0; text-align: center; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px;
        }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 40px 0; }
        .category-card { background: white; padding: 20px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow-sm); transition: var(--transition); cursor: pointer; border: 1px solid var(--gray-100); }
        .category-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: var(--primary); }

        /* 3. Ebook Listing */
        .filters-sidebar { width: 250px; padding-right: 20px; border-right: 1px solid var(--gray-200); }
        .ebook-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        .ebook-grid.list-view { grid-template-columns: 1fr; }
        
        /* 4. Details */
        .book-details-layout { display: grid; grid-template-columns: 300px 1fr; gap: 40px; margin-top: 40px; }
        .book-cover-large { width: 100%; border-radius: 12px; box-shadow: var(--shadow-lg); }
        .feature-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--gray-200); }

        /* 7. Reader */
        .reader-interface { height: calc(100vh - 70px); display: flex; flex-direction: column; background: #FAF3E0; /* Paper color */ transition: background 0.3s; }
        .reader-interface.dark-mode { background: #1a1a1a; color: #d4d4d4; }
        .reader-content { flex: 1; overflow-y: auto; padding: 60px; font-family: 'Merriweather', serif; max-width: 800px; margin: 0 auto; font-size: 18px; line-height: 1.8; }
        .reader-toolbar { background: rgba(0,0,0,0.05); padding: 10px 20px; display: flex; justify-content: center; gap: 20px; backdrop-filter: blur(5px); }

        /* 8. Cart Slide-in */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
        .cart-overlay.open { display: block; }
        .cart-panel { position: fixed; top: 0; right: 0; width: 400px; height: 100%; background: white; z-index: 201; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .cart-panel.open { transform: translateX(0); }

        /* Responsive */
        @media (max-width: 768px) {
            .book-details-layout { grid-template-columns: 1fr; }
            .filters-sidebar { display: none; } /* Simplified for mobile */
            .cart-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Mock Data ---
        const CATEGORIES = ["Fiction", "Sci-Fi", "Business", "Design", "History", "Self-Help"];
        
        const INITIAL_BOOKS = [
            { id: 1, title: "The Design of Everyday Things", author: "Don Norman", price: 24.99, rating: 4.8, category: "Design", cover: "https://picsum.photos/seed/design1/300/450", desc: "A powerful primer on how and why some products satisfy customers while others only frustrate them.", featured: true, pages: 368 },
            { id: 2, title: "Dune", author: "Frank Herbert", price: 18.50, oldPrice: 25.00, rating: 4.9, category: "Sci-Fi", cover: "https://picsum.photos/seed/dune/300/450", desc: "Set on the desert planet Arrakis, Dune is the story of the boy Paul Atreides.", featured: true, pages: 688 },
            { id: 3, title: "Atomic Habits", author: "James Clear", price: 15.99, rating: 4.7, category: "Self-Help", cover: "https://picsum.photos/seed/atomic/300/450", desc: "No matter your goals, Atomic Habits offers a proven framework for improving every day.", featured: false, pages: 320 },
            { id: 4, title: "Zero to One", author: "Peter Thiel", price: 22.00, rating: 4.5, category: "Business", cover: "https://picsum.photos/seed/zero/300/450", desc: "Notes on startups, or how to build the future.", featured: true, pages: 224 },
            { id: 5, title: "Sapiens", author: "Yuval Noah Harari", price: 19.99, rating: 4.6, category: "History", cover: "https://picsum.photos/seed/sapiens/300/450", desc: "A brief history of humankind.", featured: false, pages: 443 },
            { id: 6, title: "1984", author: "George Orwell", price: 12.99, rating: 4.9, category: "Fiction", cover: "https://picsum.photos/seed/1984/300/450", desc: "Among the seminal texts of the 20th century, Nineteen Eighty-Four is a rare work that grows more haunting as its futuristic purgatory becomes more real.", featured: false, pages: 328 },
            { id: 7, title: "Clean Code", author: "Robert C. Martin", price: 30.50, rating: 4.8, category: "Design", cover: "https://picsum.photos/seed/code/300/450", desc: "Even bad code can function. But if code isn't clean, it can bring a development organization to its knees.", featured: false, pages: 464 },
            { id: 8, title: "Project Hail Mary", author: "Andy Weir", price: 21.00, rating: 4.9, category: "Sci-Fi", cover: "https://picsum.photos/seed/weir/300/450", desc: "Ryland Grace is the sole survivor on a desperate, last-chance mission—and if he fails, humanity and the earth itself will perish.", featured: true, pages: 496 },
        ];

        // --- Icons Helper ---
        const Icon = ({ name, size="20px" }) => <span className="material-icons-round" style={{ fontSize: size }}>{name}</span>;

        // --- Toast System ---
        const ToastContainer = ({ toasts }) => (
            <div className="toast-container">
                {toasts.map(toast => (
                    <div key={toast.id} className={`toast ${toast.type}`}>
                        <Icon name={toast.type === 'success' ? 'check_circle' : 'error'} size="20px" />
                        <span>{toast.message}</span>
                    </div>
                ))}
            </div>
        );

        // --- Components ---

        // 1. Navbar
        const Navbar = ({ cartCount, onNavigate, onSearch, toggleCart, user }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            return (
                <header className="flex items-center" style={{ height: '70px' }}>
                    <div className="container flex justify-between items-center" style={{ width: '100%' }}>
                        <div className="flex items-center gap-4">
                            <h2 style={{ color: 'var(--primary)', cursor: 'pointer' }} onClick={() => onNavigate('home')}>
                                <Icon name="menu_book" style={{ verticalAlign: 'middle' }} /> Lumina
                            </h2>
                            <nav className="hidden-mobile" style={{ marginLeft: '20px', display: window.innerWidth > 768 ? 'flex' : 'none', gap: '10px' }}>
                                <a onClick={() => onNavigate('home')} className="nav-link">Home</a>
                                <a onClick={() => onNavigate('listing')} className="nav-link">Browse</a>
                                <a onClick={() => user ? onNavigate('profile') : onNavigate('login')} className="nav-link">Account</a>
                            </nav>
                        </div>

                        <div className="flex items-center gap-4">
                            {/* Search Bar (Top) */}
                            <div style={{ position: 'relative', display: window.innerWidth > 600 ? 'block' : 'none' }}>
                                <input 
                                    type="text" 
                                    placeholder="Search titles, authors..." 
                                    style={{ padding: '8px 16px 8px 36px', borderRadius: '20px', border: '1px solid var(--gray-200)', width: '250px', outline: 'none' }}
                                    onChange={(e) => onSearch(e.target.value)}
                                />
                                <Icon name="search" style={{ position: 'absolute', left: '10px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)', fontSize: '18px' }} />
                            </div>

                            <div className="flex items-center gap-2">
                                <button className="btn btn-icon btn-outline" onClick={toggleCart}>
                                    <Icon name="shopping_cart" />
                                    {cartCount > 0 && <span className="badge badge-sale" style={{ position: 'absolute', top: '0', right: '0', padding: '2px 6px' }}>{cartCount}</span>}
                                </button>
                                <button className="btn btn-icon btn-outline" onClick={() => user ? onNavigate('profile') : onNavigate('login')}>
                                    <Icon name={user ? "account_circle" : "login"} />
                                </button>
                                <button className="btn btn-icon btn-outline" style={{ display: window.innerWidth <= 768 ? 'flex' : 'none' }} onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                    <Icon name="menu" />
                                </button>
                            </div>
                        </div>
                    </div>
                    {/* Mobile Menu */}
                    {mobileMenuOpen && (
                        <div className="animate-fade-in" style={{ position: 'absolute', top: '70px', left: 0, width: '100%', background: 'white', padding: '20px', borderBottom: '1px solid var(--gray-200)', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                            <a onClick={() => {onNavigate('home'); setMobileMenuOpen(false);}}>Home</a>
                            <a onClick={() => {onNavigate('listing'); setMobileMenuOpen(false);}}>Browse</a>
                            <a onClick={() => {onNavigate('profile'); setMobileMenuOpen(false);}}>Account</a>
                        </div>
                    )}
                </header>
            );
        };

        // 2. Hero & Home
        const Hero = ({ onExplore }) => (
            <section className="hero animate-fade-in">
                <div className="container">
                    <span className="badge badge-rating" style={{ marginBottom: '10px' }}>New Release</span>
                    <h1 style={{ fontSize: '3rem', marginBottom: '20px', color: 'var(--dark)' }}>Discover Your Next<br/>Great Adventure</h1>
                    <p style={{ fontSize: '1.2rem', color: 'var(--text-muted)', marginBottom: '30px', maxWidth: '600px', marginLeft: 'auto', marginRight: 'auto' }}>
                        Explore thousands of ebooks from best-selling authors. Read anywhere, anytime.
                    </p>
                    <div className="flex justify-center gap-4">
                        <button className="btn btn-primary" onClick={onExplore}>Explore Now</button>
                        <button className="btn btn-outline">View Bestsellers</button>
                    </div>
                </div>
            </section>
        );

        const BookCard = ({ book, onView, onAdd, layout = 'grid' }) => (
            <div className={`animate-fade-in ${layout === 'grid' ? '' : 'flex'}`} style={{ gap: '20px', background: 'white', padding: layout === 'grid' ? '0' : '15px', borderRadius: 'var(--radius)', border: layout === 'grid' ? 'none' : '1px solid var(--gray-200)', boxShadow: layout === 'grid' ? 'none' : 'var(--shadow-sm)' }}>
                <div style={{ position: 'relative', cursor: 'pointer', flexShrink: 0, width: layout === 'grid' ? '100%' : '120px' }} onClick={() => onView(book.id)}>
                    <img src={book.cover} alt={book.title} style={{ width: '100%', borderRadius: layout === 'grid' ? 'var(--radius)' : '4px', aspectRatio: '2/3', objectFit: 'cover' }} />
                    {book.oldPrice && <span className="badge badge-sale" style={{ position: 'absolute', top: '10px', left: '10px' }}>SALE</span>}
                </div>
                <div className="flex flex-col justify-between" style={{ width: '100%' }}>
                    <div>
                        <div style={{ fontSize: '0.8rem', color: 'var(--primary)', fontWeight: '600', marginBottom: '4px' }}>{book.category}</div>
                        <h4 style={{ marginBottom: '5px', fontSize: '1.1rem' }}>{book.title}</h4>
                        <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '10px' }}>{book.author}</p>
                        <div className="flex items-center gap-2" style={{ fontSize: '0.85rem', marginBottom: '15px' }}>
                            <span className="badge badge-rating"><Icon name="star" size="14px" /> {book.rating}</span>
                            <span style={{ color: 'var(--text-muted)' }}>({Math.floor(Math.random() * 500)} reviews)</span>
                        </div>
                    </div>
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <span style={{ fontWeight: '700', fontSize: '1.2rem' }}>${book.price}</span>
                            {book.oldPrice && <span style={{ textDecoration: 'line-through', color: 'var(--text-muted)', fontSize: '0.9rem' }}>${book.oldPrice}</span>}
                        </div>
                        <button className="btn btn-sm btn-primary" onClick={() => onAdd(book)}>
                            <Icon name="add_shopping_cart" size="16px" /> Add
                        </button>
                    </div>
                </div>
            </div>
        );

        // 3. Listing & Filter
        const EbookListing = ({ books, onView, onAdd }) => {
            const [filterCat, setFilterCat] = useState('All');
            const [sort, setSort] = useState('popular');
            const [viewMode, setViewMode] = useState('grid');
            const [priceRange, setPriceRange] = useState(50);

            const filteredBooks = useMemo(() => {
                let result = [...books];
                if (filterCat !== 'All') result = result.filter(b => b.category === filterCat);
                result = result.filter(b => b.price <= priceRange);
                if (sort === 'priceLow') result.sort((a,b) => a.price - b.price);
                if (sort === 'priceHigh') result.sort((a,b) => b.price - a.price);
                if (sort === 'rating') result.sort((a,b) => b.rating - a.rating);
                return result;
            }, [books, filterCat, sort, priceRange]);

            return (
                <div className="container animate-fade-in" style={{ marginTop: '40px', marginBottom: '60px' }}>
                    <div className="flex justify-between items-center" style={{ marginBottom: '30px' }}>
                        <h2>Browse Ebooks</h2>
                        <div className="flex gap-2">
                            <button className={`btn btn-sm ${viewMode === 'grid' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setViewMode('grid')}><Icon name="grid_view" /></button>
                            <button className={`btn btn-sm ${viewMode === 'list' ? 'btn-primary' : 'btn-outline'}`} onClick={() => setViewMode('list')}><Icon name="view_list" /></button>
                        </div>
                    </div>
                    
                    <div className="flex">
                        {/* Sidebar Filters */}
                        <aside className="filters-sidebar hidden-mobile" style={{ display: window.innerWidth > 768 ? 'block' : 'none' }}>
                            <div style={{ marginBottom: '30px' }}>
                                <h4 style={{ marginBottom: '15px' }}>Categories</h4>
                                <div className="flex flex-col gap-2">
                                    <label className="flex items-center gap-2"><input type="radio" name="cat" checked={filterCat === 'All'} onChange={() => setFilterCat('All')} /> All</label>
                                    {CATEGORIES.map(c => (
                                        <label key={c} className="flex items-center gap-2">
                                            <input type="radio" name="cat" checked={filterCat === c} onChange={() => setFilterCat(c)} /> {c}
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div style={{ marginBottom: '30px' }}>
                                <h4 style={{ marginBottom: '15px' }}>Max Price: ${priceRange}</h4>
                                <input type="range" min="0" max="50" value={priceRange} onChange={(e) => setPriceRange(Number(e.target.value))} style={{ width: '100%' }} />
                            </div>
                            <button className="btn btn-outline" style={{ width: '100%' }} onClick={() => { setFilterCat('All'); setPriceRange(50); }}>Clear Filters</button>
                        </aside>

                        {/* Main Grid */}
                        <main style={{ flex: 1 }}>
                            <div className="flex justify-between items-center" style={{ marginBottom: '20px' }}>
                                <span style={{ color: 'var(--text-muted)' }}>Showing {filteredBooks.length} results</span>
                                <select value={sort} onChange={(e) => setSort(e.target.value)} style={{ padding: '8px', borderRadius: 'var(--radius)', border: '1px solid var(--gray-200)' }}>
                                    <option value="popular">Most Popular</option>
                                    <option value="priceLow">Price: Low to High</option>
                                    <option value="priceHigh">Price: High to Low</option>
                                    <option value="rating">Top Rated</option>
                                </select>
                            </div>

                            {filteredBooks.length > 0 ? (
                                <div className={`grid ebook-grid ${viewMode === 'list' ? 'list-view' : ''}`}>
                                    {filteredBooks.map(book => (
                                        <BookCard key={book.id} book={book} onView={onView} onAdd={onAdd} layout={viewMode} />
                                    ))}
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center" style={{ padding: '60px', background: 'white', borderRadius: 'var(--radius)', textAlign: 'center' }}>
                                    <Icon name="search_off" size="48px" style={{ color: 'var(--gray-200)', marginBottom: '10px' }} />
                                    <h3>No books found</h3>
                                    <p style={{ color: 'var(--text-muted)' }}>Try adjusting your filters.</p>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        // 4. Details Page
        const EbookDetails = ({ book, onAdd, onReadPreview, onBack }) => {
            if (!book) return <div>Loading...</div>;

            return (
                <div className="container animate-fade-in">
                    <button onClick={onBack} className="btn btn-outline" style={{ marginTop: '20px' }}><Icon name="arrow_back" /> Back</button>
                    
                    <div className="book-details-layout">
                        <div>
                            <img src={book.cover} alt={book.title} className="book-cover-large" />
                            <div className="flex gap-2" style={{ marginTop: '20px' }}>
                                <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => onAdd(book)}><Icon name="add_shopping_cart" /> Add to Cart</button>
                                <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => onReadPreview(book)}>Read Preview</button>
                            </div>
                        </div>
                        
                        <div>
                            <span className="badge badge-sale" style={{ background: '#EEF2FF', color: 'var(--primary)' }}>{book.category}</span>
                            <h1 style={{ fontSize: '2.5rem', margin: '10px 0' }}>{book.title}</h1>
                            <p style={{ fontSize: '1.2rem', color: 'var(--text-muted)', marginBottom: '20px' }}>by {book.author}</p>
                            
                            <div className="flex items-center gap-4" style={{ marginBottom: '30px', paddingBottom: '20px', borderBottom: '1px solid var(--gray-200)' }}>
                                <div className="flex items-center gap-2" style={{ fontSize: '1.5rem', fontWeight: '700' }}>
                                    ${book.price}
                                    {book.oldPrice && <span style={{ fontSize: '1rem', textDecoration: 'line-through', color: 'var(--text-muted)', fontWeight: '400' }}>${book.oldPrice}</span>}
                                </div>
                                <span className="badge badge-rating"><Icon name="star" size="16px" /> {book.rating} (1,240 reviews)</span>
                            </div>

                            <h3>Description</h3>
                            <p style={{ color: 'var(--text-muted)', marginBottom: '30px', lineHeight: '1.7' }}>{book.desc} Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>

                            <h3>Product Details</h3>
                            <ul className="feature-list" style={{ listStyle: 'none', color: 'var(--text-muted)' }}>
                                <li><span>Format</span> <span>EPUB, PDF</span></li>
                                <li><span>Pages</span> <span>{book.pages}</span></li>
                                <li><span>Language</span> <span>English</span></li>
                                <li><span>Publication Date</span> <span>Oct 2023</span></li>
                                <li><span>File Size</span> <span>5.2 MB</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // 7. Reader Interface
        const Reader = ({ book, onClose, fontSize, setFontSize, darkMode, setDarkMode }) => {
            if (!book) return null;

            return (
                <div className={`reader-interface ${darkMode ? 'dark-mode' : ''}`}>
                    <div className="flex items-center justify-between" style={{ padding: '15px 20px', borderBottom: '1px solid rgba(0,0,0,0.1)' }}>
                        <button className="btn btn-sm btn-outline" onClick={onClose}><Icon name="close" /> Close Reader</button>
                        <h4 style={{ fontSize: '1rem' }}>{book.title} <span style={{ fontWeight: '400', fontSize: '0.8rem', opacity: 0.7 }}>(Preview Mode)</span></h4>
                        <div style={{ width: '80px' }}></div> {/* Spacer */}
                    </div>
                    
                    <div className="reader-content" style={{ fontSize: `${fontSize}px` }}>
                        <h1>Chapter 1: The Beginning</h1>
                        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vivamus lacinia odio vitae vestibulum vestibulum. Cras venenatis euismod malesuada. Nullam ac odio ten.</p>
                        <p style={{ marginTop: '20px' }}>Fusce dapibus, tellus ac cursus commodo, tortor mauris condimentum nibh, ut fermentum massa justo sit amet risus. Curabitur blandit tempus porttitor. Aenean eu leo quam. Pellentesque ornare sem lacinia quam venenatis vestibulum.</p>
                        <p style={{ marginTop: '20px' }}>Donec ullamcorper nulla non metus auctor fringilla. Cras mattis consectetur purus sit amet fermentum. Cras justo odio, dapibus ac facilisis in, egestas eget quam. Morbi leo risus, porta ac consectetur ac, vestibulum at eros.</p>
                        <p style={{ marginTop: '20px' }}>Praesent commodo cursus magna, vel scelerisque nisl consectetur et. Etiam porta sem malesuada magna mollis euismod. Cras mattis consectetur purus sit amet fermentum. Cras justo odio, dapibus ac facilisis in, egestas eget quam.</p>
                        <br/><br/><br/>
                        <div style={{ textAlign: 'center', color: 'var(--secondary)', fontWeight: 'bold' }}>--- End of Preview ---</div>
                    </div>

                    <div className="reader-toolbar">
                        <button className="btn btn-sm btn-outline" onClick={() => setFontSize(Math.max(14, fontSize - 2))}><Icon name="remove" /></button>
                        <span style={{ fontSize: '0.9rem', fontWeight: '600' }}>Font Size</span>
                        <button className="btn btn-sm btn-outline" onClick={() => setFontSize(Math.min(32, fontSize + 2))}><Icon name="add" /></button>
                        <div style={{ width: '1px', background: '#ccc', height: '20px' }}></div>
                        <button className="btn btn-sm btn-outline" onClick={() => setDarkMode(!darkMode)}><Icon name={darkMode ? "light_mode" : "dark_mode"} /></button>
                        <button className="btn btn-sm btn-outline"><Icon name="bookmark_border" /></button>
                    </div>
                </div>
            );
        };

        // 8. Cart & Checkout
        const CartPanel = ({ isOpen, closeCart, items, onRemove, total, onCheckout }) => (
            <>
                <div className={`cart-overlay ${isOpen ? 'open' : ''}`} onClick={closeCart}></div>
                <div className={`cart-panel ${isOpen ? 'open' : ''}`}>
                    <div className="flex items-center justify-between" style={{ padding: '20px', borderBottom: '1px solid var(--gray-200)' }}>
                        <h3>Your Cart ({items.length})</h3>
                        <button className="btn btn-icon" onClick={closeCart}><Icon name="close" /></button>
                    </div>
                    
                    <div style={{ flex: 1, overflowY: 'auto', padding: '20px' }}>
                        {items.length === 0 ? (
                            <div className="flex flex-col items-center justify-center" style={{ height: '100%', color: 'var(--text-muted)', textAlign: 'center' }}>
                                <Icon name="shopping_cart" size="48px" style={{ marginBottom: '10px', opacity: 0.5 }} />
                                <p>Your cart is empty.</p>
                            </div>
                        ) : (
                            items.map(item => (
                                <div key={item.id} className="flex gap-4" style={{ marginBottom: '20px', paddingBottom: '20px', borderBottom: '1px solid var(--gray-100)' }}>
                                    <img src={item.cover} style={{ width: '60px', borderRadius: '4px' }} />
                                    <div style={{ flex: 1 }}>
                                        <h4 style={{ fontSize: '0.95rem' }}>{item.title}</h4>
                                        <div style={{ color: 'var(--primary)', fontWeight: '600' }}>${item.price}</div>
                                    </div>
                                    <button className="btn btn-icon" style={{ color: '#DC2626' }} onClick={() => onRemove(item.id)}><Icon name="delete_outline" /></button>
                                </div>
                            ))
                        )}
                    </div>

                    <div style={{ padding: '20px', background: 'var(--gray-100)', borderTop: '1px solid var(--gray-200)' }}>
                        {items.length > 0 && (
                            <>
                                <div className="flex justify-between" style={{ marginBottom: '10px' }}>
                                    <span>Subtotal</span>
                                    <span>${total.toFixed(2)}</span>
                                </div>
                                <div className="flex gap-2" style={{ marginBottom: '10px' }}>
                                    <input type="text" placeholder="Promo Code" style={{ flex: 1, padding: '8px', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius)' }} />
                                    <button className="btn btn-outline" style={{ padding: '8px 12px' }}>Apply</button>
                                </div>
                                <div className="flex items-center gap-2" style={{ marginBottom: '15px', fontSize: '0.8rem', color: 'var(--text-muted)' }}>
                                    <Icon name="lock" size="14px" /> Secure Checkout
                                </div>
                                <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={onCheckout}>Checkout Now</button>
                            </>
                        )}
                    </div>
                </div>
            </>
        );

        // 6. User Account (Mock)
        const UserProfile = ({ user, purchased }) => (
            <div className="container animate-fade-in" style={{ marginTop: '40px' }}>
                <div className="flex items-center gap-4" style={{ marginBottom: '40px' }}>
                    <div style={{ width: '80px', height: '80px', borderRadius: '50%', background: 'var(--gray-200)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <Icon name="person" size="40px" style={{ color: 'var(--gray-500)' }} />
                    </div>
                    <div>
                        <h2>{user.name}</h2>
                        <p style={{ color: 'var(--text-muted)' }}>{user.email}</p>
                    </div>
                </div>
                <h3>My Library</h3>
                <div className="grid ebook-grid" style={{ marginTop: '20px' }}>
                    {purchased.length > 0 ? purchased.map(book => (
                        <div key={book.id} style={{ background: 'white', padding: '10px', borderRadius: 'var(--radius)' }}>
                            <img src={book.cover} style={{ width: '100%', borderRadius: '4px', marginBottom: '10px' }} />
                            <button className="btn btn-sm btn-primary" style={{ width: '100%' }}>Read Now</button>
                        </div>
                    )) : <p>No purchased books yet.</p>}
                </div>
            </div>
        );

        const LoginModal = ({ onLogin, onClose }) => (
            <div className="flex items-center justify-center animate-fade-in" style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', background: 'rgba(0,0,0,0.5)', zIndex: '300' }}>
                <div style={{ background: 'white', padding: '40px', borderRadius: 'var(--radius)', width: '100%', maxWidth: '400px', position: 'relative' }}>
                    <button onClick={onClose} style={{ position: 'absolute', top: '15px', right: '15px' }}><Icon name="close" /></button>
                    <h2 style={{ textAlign: 'center', marginBottom: '20px' }}>Welcome Back</h2>
                    <input type="email" placeholder="Email" style={{ width: '100%', padding: '10px', marginBottom: '15px', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius)' }} />
                    <input type="password" placeholder="Password" style={{ width: '100%', padding: '10px', marginBottom: '20px', border: '1px solid var(--gray-200)', borderRadius: 'var(--radius)' }} />
                    <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center' }} onClick={onLogin}>Sign In</button>
                    <p style={{ textAlign: 'center', marginTop: '15px', fontSize: '0.9rem', color: 'var(--text-muted)' }}>
                        Don't have an account? <span style={{ color: 'var(--primary)', cursor: 'pointer' }}>Sign up</span>
                    </p>
                </div>
            </div>
        );

        // --- Main App Component ---
        const App = () => {
            const [view, setView] = useState('home'); // home, listing, details, reader, profile, login
            const [selectedBook, setSelectedBook] = useState(null);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [user, setUser] = useState(null); // { name: 'John Doe', email: 'john@example.com' }
            const [toasts, setToasts] = useState([]);
            const [fontSize, setFontSize] = useState(18);
            const [darkMode, setDarkMode] = useState(false);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            const addToCart = (book) => {
                if(cart.find(item => item.id === book.id)) {
                    addToast("Item already in cart", "error");
                    return;
                }
                setCart([...cart, book]);
                addToast(`Added "${book.title}" to cart`);
                setIsCartOpen(true);
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.id !== id));
            };

            const handleCheckout = () => {
                if (!user) {
                    setView('login');
                    setIsCartOpen(false);
                    addToast("Please login to checkout", "error");
                    return;
                }
                addToast("Order placed successfully!");
                setCart([]);
                setIsCartOpen(false);
                // Simulate adding to library
                setUser({...user, library: [...(user.library || []), ...cart]});
            };

            const navigate = (page, bookId = null) => {
                if (bookId) {
                    const book = INITIAL_BOOKS.find(b => b.id === bookId);
                    setSelectedBook(book);
                }
                window.scrollTo(0,0);
                setView(page);
            };

            // Main Router Logic
            const renderContent = () => {
                switch(view) {
                    case 'home':
                        return (
                            <>
                                <Hero onExplore={() => navigate('listing')} />
                                <div className="container">
                                    <h3 style={{ marginTop: '40px' }}>Categories</h3>
                                    <div className="category-grid">
                                        {CATEGORIES.map(cat => (
                                            <div key={cat} className="category-card" onClick={() => { setView('listing'); /* In real app, set filter here */ }}>
                                                <Icon name="book" size="32px" style={{ color: 'var(--primary)', marginBottom: '10px' }} />
                                                <div>{cat}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <h3>Trending Now</h3>
                                    <div className="grid ebook-grid" style={{ marginTop: '20px', marginBottom: '60px' }}>
                                        {INITIAL_BOOKS.filter(b => b.featured).map(book => (
                                            <BookCard key={book.id} book={book} onView={(id) => navigate('details', id)} onAdd={addToCart} />
                                        ))}
                                    </div>
                                    <div style={{ background: 'var(--dark)', color: 'white', padding: '60px 0', borderRadius: '20px', textAlign: 'center', marginBottom: '60px' }}>
                                        <h2 style={{ marginBottom: '15px' }}>Join Lumina Premium</h2>
                                        <p style={{ marginBottom: '25px', opacity: 0.8 }}>Get unlimited access to thousands of ebooks for $9.99/month.</p>
                                        <button className="btn btn-primary" style={{ background: 'var(--secondary)' }}>Start Free Trial</button>
                                    </div>
                                </div>
                            </>
                        );
                    case 'listing':
                        // Filter by search query if exists
                        const booksToShow = searchQuery 
                            ? INITIAL_BOOKS.filter(b => b.title.toLowerCase().includes(searchQuery.toLowerCase()) || b.author.toLowerCase().includes(searchQuery.toLowerCase()))
                            : INITIAL_BOOKS;
                        return <EbookListing books={booksToShow} onView={(id) => navigate('details', id)} onAdd={addToCart} />;
                    case 'details':
                        return <EbookDetails book={selectedBook} onAdd={addToCart} onReadPreview={(b) => navigate('reader', b.id)} onBack={() => navigate('listing')} />;
                    case 'reader':
                        return <Reader book={selectedBook} onClose={() => navigate('details', selectedBook.id)} fontSize={fontSize} setFontSize={setFontSize} darkMode={darkMode} setDarkMode={setDarkMode} />;
                    case 'profile':
                        if (!user) { navigate('login'); return null; }
                        return <UserProfile user={user} purchased={user.library || []} />;
                    case 'login':
                        return <LoginModal onLogin={() => setUser({ name: 'Alex Reader', email: 'alex@lumina.com', library: [] })} onClose={() => navigate('home')} />;
                    default:
                        return <div>Page not found</div>;
                }
            };

            return (
                <div className="flex flex-col" style={{ minHeight: '100vh' }}>
                    <Navbar 
                        cartCount={cart.length} 
                        onNavigate={navigate} 
                        onSearch={setSearchQuery}
                        toggleCart={() => setIsCartOpen(!isCartOpen)}
                        user={user}
                    />
                    
                    <main style={{ flex: 1 }}>
                        {renderContent()}
                    </main>

                    {/* Footer */}
                    <footer style={{ background: 'var(--dark)', color: 'var(--gray-500)', padding: '60px 0', marginTop: 'auto' }}>
                        <div className="container" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '40px' }}>
                            <div>
                                <h3 style={{ color: 'white', marginBottom: '20px' }}>Lumina</h3>
                                <p style={{ fontSize: '0.9rem' }}>The best place to discover, read, and collect ebooks.</p>
                            </div>
                            <div>
                                <h4 style={{ color: 'white', marginBottom: '15px' }}>Quick Links</h4>
                                <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: '10px', fontSize: '0.9rem' }}>
                                    <li>About Us</li>
                                    <li>Blog</li>
                                    <li>Authors</li>
                                    <li>Careers</li>
                                </ul>
                            </div>
                            <div>
                                <h4 style={{ color: 'white', marginBottom: '15px' }}>Support</h4>
                                <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: '10px', fontSize: '0.9rem' }}>
                                    <li>Help Center</li>
                                    <li>Terms of Service</li>
                                    <li>Privacy Policy</li>
                                    <li>Contact</li>
                                </ul>
                            </div>
                            <div>
                                <h4 style={{ color: 'white', marginBottom: '15px' }}>Payment Methods</h4>
                                <div className="flex gap-2" style={{ fontSize: '24px' }}>
                                    <Icon name="credit_card" />
                                    <Icon name="payment" />
                                </div>
                            </div>
                        </div>
                        <div className="container" style={{ marginTop: '40px', paddingTop: '20px', borderTop: '1px solid #374151', textAlign: 'center', fontSize: '0.8rem' }}>
                            &copy; 2023 Lumina Ebook Store. All rights reserved.
                        </div>
                    </footer>

                    <CartPanel 
                        isOpen={isCartOpen} 
                        closeCart={() => setIsCartOpen(false)} 
                        items={cart} 
                        onRemove={removeFromCart} 
                        total={cart.reduce((sum, item) => sum + item.price, 0)}
                        onCheckout={handleCheckout}
                    />

                    <ToastContainer toasts={toasts} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
